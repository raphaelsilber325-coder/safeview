<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>מוצר | SafeView</title>
<meta name="description" content="פרטי מצלמת אבטחה SafeView – מפרט מלא, מחיר והזמנה מהירה.">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Noto+Sans+Hebrew:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/style.css">
<link rel="preload" href="assets/app.js" as="script">
</head>
<body>

<div id="nav-mount"></div>

<div class="pdp-back-wrap">
  <a class="pdp-back-btn" href="index.html#products" onclick="if(document.referrer&&document.referrer.indexOf(location.hostname)>=0){history.back();return false;}">← חזרה לכל המצלמות</a>
</div>

<div class="pdp" id="pdp"></div>

<!-- מקטע ביקורות — מוכן ל-Judge.me (להחליף את ה-data-judgeme-id לאחר התקנת האפליקציה) -->
<section class="reveal reviews-section" style="padding-top:0">
  <div class="section-label">// ביקורות לקוחות</div>
  <div class="section-title">מה <strong>הלקוחות אומרים</strong></div>
  <div class="section-sub" style="margin-bottom:24px">ביקורות אמיתיות מלקוחות שקנו את המוצר</div>
  <!-- Judge.me Product Reviews Widget -->
  <div id="judgeme_product_reviews" data-id="" class="reviews-empty">
    <div class="reviews-empty-text">
      <strong>אנחנו אוספים ביקורות אמיתיות.</strong> רכשת את המוצר? נשמח לשמוע מה דעתך — פנה אלינו בוואטסאפ אחרי שתקבל ותתנסה.
    </div>
    <a class="btn-wa" id="reviewWa" href="#">שלח את חוות הדעת שלך</a>
  </div>
</section>

<section id="rvSection" style="display:none;padding-top:0">
  <div class="section-label">// נצפו לאחרונה</div>
  <div class="section-title">המשכת <strong>לגלוש</strong></div>
  <div class="products-grid" id="rvGrid" style="margin-top:20px"></div>
</section>

<section class="reveal" style="padding-top:0">
  <div class="section-label">// אולי תאהבו גם</div>
  <div class="section-title">מוצרים <strong>נוספים</strong></div>
  <div class="section-sub" style="margin-bottom:24px"></div>
  <div class="products-grid" id="related"></div>
</section>

<div id="footer-mount"></div>

<script src="assets/app.js"></script>
<script>
  var params = new URLSearchParams(location.search);
  var id = params.get('id') || params.get('handle');

  // skeleton בזמן הטעינה מ-Shopify
  document.getElementById('pdp').innerHTML =
    '<div class="pdp-gallery skel-block" style="min-height:320px;border-radius:12px"></div>' +
    '<div class="pdp-info">' +
      '<div class="skel-block" style="height:28px;margin-bottom:16px;border-radius:6px"></div>' +
      '<div class="skel-block" style="height:22px;width:35%;margin-bottom:24px;border-radius:6px"></div>' +
      '<div class="skel-block" style="height:14px;margin-bottom:8px;border-radius:4px"></div>' +
      '<div class="skel-block" style="height:14px;width:75%;border-radius:4px"></div>' +
    '</div>';

  function addMeta(prop, val){
    var m = document.createElement('meta'); m.setAttribute('property', prop); m.setAttribute('content', val); document.head.appendChild(m);
  }

  function renderPdp(p) {
    var seoDesc = p.desc.length > 155 ? p.desc.substring(0, 152) + '...' : p.desc;
    document.title = p.name + ' | SafeView — מצלמות אבטחה';
    document.querySelector('meta[name="description"]').setAttribute('content', seoDesc);
    addMeta('og:title', p.name + ' | SafeView');
    addMeta('og:description', seoDesc);
    addMeta('og:type', 'product');
    addMeta('og:image', p.img);
    addMeta('product:price:amount', String(p.price));
    addMeta('product:price:currency', 'ILS');

    var jsonLd = {
      "@context":"https://schema.org","@type":"Product",
      "name": p.name,"description": p.desc,"image": p.img,"category": p.cat,
      "brand":{"@type":"Brand","name":"SafeView"},
      "offers":{"@type":"Offer","priceCurrency":"ILS","price": p.price,
        "availability":"https://schema.org/InStock","seller":{"@type":"Organization","name":"SafeView"}}
    };
    var s = document.createElement('script'); s.type = 'application/ld+json'; s.textContent = JSON.stringify(jsonLd); document.head.appendChild(s);

    var baseUrl = location.origin + location.pathname.replace(/[^/]+$/, '');
    var breadcrumbs = {
      "@context":"https://schema.org","@type":"BreadcrumbList",
      "itemListElement":[
        { "@type":"ListItem","position":1,"name":"דף הבית","item": baseUrl + "index.html" },
        { "@type":"ListItem","position":2,"name":"מצלמות " + p.cat,"item": baseUrl + "index.html#categories" },
        { "@type":"ListItem","position":3,"name": p.name,"item": location.href }
      ]
    };
    var s2 = document.createElement('script'); s2.type = 'application/ld+json'; s2.textContent = JSON.stringify(breadcrumbs); document.head.appendChild(s2);

    // variant state
    window._selVid = p.variantId ? String(p.variantId) : null;
    window._selPrice = p.price;
    window.selectVariant = function(el) {
      document.querySelectorAll('.vbtn').forEach(function(b){ b.classList.remove('vbtn-active'); });
      el.classList.add('vbtn-active');
      window._selVid = el.dataset.vid;
      window._selPrice = parseInt(el.dataset.price, 10);
      document.querySelectorAll('.pdp-price,.pdp-sticky-price').forEach(function(e){ e.textContent = fmt(window._selPrice); });
      if (el.dataset.img) {
        var mainImg = document.getElementById('mainImg');
        if (mainImg) {
          mainImg.src = el.dataset.img;
          document.querySelectorAll('.pdp-thumb').forEach(function(t){ t.classList.remove('active'); });
        }
      }
    };

    var msg = 'שלום SafeView! אני מעוניין/ת במצלמה: ' + p.name + ' (' + fmt(p.price) + '). אפשר פרטים?';

    // גלריה — תמונות מרובות אם יש
    var galleryHtml;
    if (p.images && p.images.length > 1) {
      galleryHtml =
        '<div class="pdp-gallery pdp-gallery-multi">' +
          '<div class="pdp-main-wrap">' +
            '<img id="mainImg" src="'+p.images[0]+'" alt="'+p.name+'">' +
            (p.badge ? '<div class="pdp-badge">'+p.badge+'</div>' : '') +
          '</div>' +
          '<div class="pdp-thumbs">' +
            p.images.slice(0,12).map(function(url,i){
              return '<img src="'+url+'" class="pdp-thumb'+(i===0?' active':'')+'" onclick="document.getElementById(\'mainImg\').src=this.src;document.querySelectorAll(\'.pdp-thumb\').forEach(function(t){t.classList.remove(\'active\');});this.classList.add(\'active\')" loading="lazy">';
            }).join('') +
          '</div>' +
        '</div>';
    } else {
      galleryHtml = '<div class="pdp-gallery"><img src="'+p.img+'" alt="'+p.name+'">' + (p.badge ? '<div class="pdp-badge">'+p.badge+'</div>' : '') + '</div>';
    }

    // variant selector
    var variantHtml = '';
    if (p.variants && p.variants.length > 1) {
      variantHtml =
        '<div style="margin-bottom:20px">' +
        '<div style="color:var(--text2);font-size:13px;margin-bottom:10px;font-weight:500">📦 בחר כמות מצלמות:</div>' +
        '<div style="display:flex;gap:10px;flex-wrap:wrap">' +
        p.variants.map(function(v,i){
          return '<button class="vbtn'+(i===0?' vbtn-active':'')+'" data-vid="'+v.id+'" data-price="'+v.price+'"'+(v.variantImg?' data-img="'+v.variantImg+'"':'')+' onclick="selectVariant(this)">'+
            v.title+'<br><strong>'+fmt(v.price)+'</strong></button>';
        }).join('') +
        '</div></div>';
    }

    document.getElementById('pdp').innerHTML =
      '<nav class="pdp-breadcrumb" aria-label="פירורי לחם"><a href="index.html">בית</a><span>›</span><a href="index.html#products">'+p.cat+'</a><span>›</span><span>'+p.name.split('|')[0].trim()+'</span></nav>' +
      '<div class="pdp-info">' +
        (p.badge === 'הכי פופולרי' ? '<div style="display:inline-flex;align-items:center;gap:6px;background:linear-gradient(135deg,#ff3a00,#ff7a00);color:#fff;font-size:16px;font-weight:900;padding:9px 22px;border-radius:30px;margin-bottom:18px;animation:badge-glow 1.5s ease-in-out infinite"><span class="fire-emoji">🔥</span> הכי פופולרי — המצלמה הנמכרת ביותר!</div>' : p.badge === 'קל להרכבה' ? '<div style="display:inline-flex;align-items:center;gap:8px;background:linear-gradient(135deg,#6200ee,#00b4ff);color:#fff;font-size:16px;font-weight:900;padding:9px 22px;border-radius:30px;margin-bottom:18px;animation:badge-glow-easy 1.5s ease-in-out infinite">⚡ הכי קל להרכבה — הכי משתלם!</div>' : '') +
        '<h1>'+p.name+'</h1>' +
        (function(){
          var oldP = getOldPrice(p);
          if (oldP) {
            return '<div class="pdp-price-wrap"><span class="pdp-price-old">'+fmt(oldP.price)+'</span><span class="pdp-price">'+fmt(p.price)+'</span><span class="pdp-discount-tag">חיסכון '+oldP.pct+'%</span></div>';
          }
          return '<div class="pdp-price">'+fmt(p.price)+'</div>';
        })() +
        getLowStockBadge(p.id) +
        '<p style="color:var(--text2);margin:18px 0 20px;line-height:1.8">'+p.desc+'</p>' +
        variantHtml +
        '<div class="pdp-buy-stack">' +
          '<button class="btn-primary" onclick="addToCart(\''+p.id+'\',1,window._selVid,window._selPrice)">🛒 הוסף לעגלה</button>' +
          '<a class="btn-paypal" href="'+paypalCheckoutLink(p)+'" target="_blank" rel="noopener"><span class="btn-paypal-icon">P</span> קנה עכשיו ב-PayPal</a>' +
          '<a class="btn-wa" href="'+waLink(msg)+'" target="_blank" rel="noopener">'+ICON.wa+' הזמן בוואטסאפ</a>' +
          '<a class="share-friend" href="'+waLink(buildFriendShareMsg(p))+'" target="_blank" rel="noopener">🎁 שלח לחבר — וקבל קופון משותף</a>' +
        '</div>' +
        '<div class="pdp-sticky">' +
          '<div class="pdp-sticky-price">'+fmt(p.price)+'</div>' +
          '<button class="btn-primary" onclick="addToCart(\''+p.id+'\',1,window._selVid,window._selPrice)">הוסף לעגלה</button>' +
        '</div>' +
        (PRODUCT_INBOX[p.id] ? '<div class="pdp-inbox-prominent"><h3>📦 מה כלול בקופסה</h3><ul>'+PRODUCT_INBOX[p.id].map(function(item){ return '<li>'+item+'</li>'; }).join('')+'</ul></div>' : '') +
        (p.specs && p.specs.length ? '<div class="pdp-specs">'+p.specs.map(function(sp){ return '<div class="pdp-spec"><span>'+sp[0]+'</span><span>'+sp[1]+'</span></div>'; }).join('')+'</div>' : '') +
        '<div class="pdp-trust">' +
          '<div><span class="pdp-trust-icon">'+ICON.truck+'</span>משלוח חינם בהזמנה מעל ₪200</div>' +
          '<div><span class="pdp-trust-icon">'+ICON.shield+'</span>אחריות מלאה לשנה + תמיכה בעברית</div>' +
          '<div><span class="pdp-trust-icon">'+ICON.refresh+'</span>14 ימי החזרה ללא שאלות</div>' +
          '<div><span class="pdp-trust-icon">'+ICON.lock+'</span>תשלום מאובטח</div>' +
        '</div>' +
      '</div>' +
      galleryHtml +
      renderReviewsSection(p.id);

    injectProductJsonLd(p);

    // related — אותה קטגוריה, עד 3 (מהמוצרים שנטענו מ-Shopify)
    fetchShopifyProducts().then(function(all){
      var rel = all.filter(function(x){ return x.cat === p.cat && x.id !== p.id; });
      if (rel.length < 3) rel = rel.concat(all.filter(function(x){ return x.id !== p.id && rel.indexOf(x) < 0; }));
      rel = rel.slice(0, 3);
      document.getElementById('related').innerHTML = rel.map(function(x){
        var m = 'שלום SafeView! אני מעוניין/ת במצלמה: ' + x.name + ' (' + fmt(x.price) + ').';
        return '<div class="prod-card">' +
          '<div class="prod-img"><a href="product.html?id='+x.id+'"><img src="'+x.img+'" alt="'+x.name+'" loading="lazy"></a>' +
            (x.badge ? '<div class="prod-badge">'+x.badge+'</div>' : '') +
          '</div>' +
          '<div class="prod-body"><a class="prod-name" href="product.html?id='+x.id+'">'+x.name+'</a>' +
            renderReviewSummaryInline(x.id) +
            getCompactInbox(x.id) +
            '<div class="prod-footer">' +
              (function(){
                var oldP = getOldPrice(x);
                if (oldP) {
                  return '<span class="prod-price-wrap"><span class="prod-price-old">'+fmt(oldP.price)+'</span><span class="prod-price">'+fmt(x.price)+'</span><span class="prod-discount-tag">-'+oldP.pct+'%</span></span>';
                }
                return '<span class="prod-price">'+fmt(x.price)+'</span>';
              })() +
              '<span class="prod-stock">במלאי</span>' +
            '</div>' +
            getLowStockBadge(x.id) +
            '<div class="prod-actions"><button class="prod-add" onclick="addToCart(\''+x.id+'\')">הוסף לעגלה</button>' +
            '<a class="prod-order" href="'+waLink(m)+'" target="_blank" rel="noopener" aria-label="וואטסאפ">'+ICON.wa+'</a></div>' +
          '</div></div>';
      }).join('');
    });

    saveRecentlyViewed(p.id);

    var rvIds = getRecentlyViewed(p.id);
    var rvProds = rvIds.map(function(rid){ return PRODUCTS.filter(function(x){ return x.id===rid; })[0]; }).filter(Boolean);
    if (rvProds.length) {
      document.getElementById('rvSection').style.display = 'block';
      document.getElementById('rvGrid').innerHTML = rvProds.map(function(x){
        return '<div class="prod-card">' +
          '<div class="prod-img"><a href="product.html?id='+x.id+'"><img src="'+x.img+'" alt="'+x.name+'" loading="lazy"></a>' +
            (x.badge==='קל להרכבה' ? '<div class="prod-badge prod-badge-easy">⚡ קל להרכבה</div>' : x.badge==='הכי פופולרי' ? '<div class="prod-badge prod-badge-hot">🔥 הכי פופולרי</div>' : (x.badge ? '<div class="prod-badge">'+x.badge+'</div>' : '')) +
          '</div>' +
          '<div class="prod-body"><a class="prod-name" href="product.html?id='+x.id+'">'+x.name+'</a>' +
            '<div class="prod-footer"><span class="prod-price">'+fmt(x.price)+'</span></div>' +
            '<div class="prod-actions"><button class="prod-add" onclick="addToCart(\''+x.id+'\')">הוסף לעגלה</button>' +
            '<a class="prod-order" href="'+waLink('שלום SafeView! אני מעוניין/ת במצלמה: '+x.name+' ('+fmt(x.price)+').')+'" target="_blank" rel="noopener" aria-label="וואטסאפ">'+ICON.wa+'</a></div>' +
          '</div></div>';
      }).join('');
    }

    window.scrollTo(0, 0);

    var rWa = document.getElementById('reviewWa');
    if (rWa) rWa.href = waLink('שלום SafeView! רכשתי את ' + p.name + ' ואני רוצה לשתף חוות דעת.');
  }

  fetchShopifyProduct(id).then(renderPdp);
</script>

</body>
</html>
