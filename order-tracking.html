<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>מעקב הזמנה | SafeView</title>
<meta name="description" content="מעקב אחר הזמנתך ב-SafeView. הכנס מספר הזמנה או פנה אלינו בוואטסאפ.">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Noto+Sans+Hebrew:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/style.css">
<style>
.track-wrap { max-width: 600px; margin: 0 auto; padding: 40px 24px 80px; }
.track-box {
  background: var(--bg2); border: 1px solid var(--border); border-radius: 20px;
  padding: 36px 32px; margin-bottom: 32px;
}
.track-box h2 { font-family: 'Rajdhani', sans-serif; font-size: 24px; margin-bottom: 20px; }
.track-input-row { display: flex; gap: 10px; }
.track-input {
  flex: 1; background: var(--bg3); border: 1px solid var(--border2); border-radius: 8px;
  padding: 12px 16px; font-size: 15px; color: var(--text); font-family: inherit;
  outline: none; transition: border-color .2s; direction: ltr;
}
.track-input:focus { border-color: var(--blue); }
.track-btn {
  background: var(--blue); color: #fff; border: none; border-radius: 8px;
  padding: 12px 24px; font-size: 15px; cursor: pointer; font-family: inherit;
  font-weight: 600; white-space: nowrap; transition: background .2s;
}
.track-btn:hover { background: var(--blue2); }
.track-result { margin-top: 24px; display: none; }
.track-result.show { display: block; }
.track-status-bar {
  display: flex; justify-content: space-between; position: relative;
  margin: 28px 0 12px;
}
.track-status-bar::before {
  content: ''; position: absolute; top: 16px; right: 16px; left: 16px;
  height: 3px; background: var(--bg4); border-radius: 2px;
}
.track-status-bar::after {
  content: ''; position: absolute; top: 16px; right: 16px;
  height: 3px; background: var(--blue); border-radius: 2px;
  width: var(--progress, 0%); transition: width .6s ease;
}
.track-step { display: flex; flex-direction: column; align-items: center; gap: 8px; z-index: 1; flex: 1; }
.track-step-dot {
  width: 32px; height: 32px; border-radius: 50%;
  background: var(--bg4); border: 2px solid var(--bg4);
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; transition: all .3s;
}
.track-step.done .track-step-dot  { background: var(--blue); border-color: var(--blue); }
.track-step.active .track-step-dot { background: var(--bg); border-color: var(--blue); box-shadow: 0 0 0 4px rgba(58,159,255,.2); }
.track-step-label { font-size: 11px; color: var(--text3); text-align: center; }
.track-step.done .track-step-label,
.track-step.active .track-step-label { color: var(--text2); }
.track-info { background: var(--bg3); border-radius: 12px; padding: 18px 20px; font-size: 14px; line-height: 1.8; color: var(--text2); margin-top: 16px; }
.track-info strong { color: var(--text); }
.track-not-found { text-align: center; padding: 24px; color: var(--text2); }
.track-wa-box {
  background: linear-gradient(135deg, rgba(37,211,102,0.08), rgba(37,211,102,0.03));
  border: 1px solid rgba(37,211,102,0.25); border-radius: 16px;
  padding: 28px; text-align: center;
}
.track-wa-box h3 { font-family: 'Rajdhani', sans-serif; font-size: 20px; margin-bottom: 10px; }
.track-wa-box p { color: var(--text2); font-size: 14px; margin-bottom: 20px; }
</style>
</head>
<body>
<div id="nav-mount"></div>

<div class="page-head">
  <h1>מעקב <strong>הזמנה</strong></h1>
  <p>הכנס את מספר ההזמנה שקיבלת בהודעת הוואטסאפ</p>
</div>

<div class="track-wrap">
  <div class="track-box">
    <h2>בדוק סטטוס הזמנה</h2>
    <div class="track-input-row">
      <input class="track-input" id="orderNum" type="text" placeholder="SV-2026-XXXXX" maxlength="20">
      <button class="track-btn" onclick="trackOrder()">בדוק סטטוס</button>
    </div>
    <div class="track-result" id="trackResult"></div>
  </div>

  <!-- WhatsApp contact -->
  <div class="track-wa-box">
    <h3>לא מצאת את ההזמנה?</h3>
    <p>פנה אלינו ישירות בוואטסאפ עם מספר ההזמנה ונעדכן אותך בזמן אמת.</p>
    <a class="btn-wa" id="trackWa" href="#" style="display:inline-flex;padding:13px 28px"><span id="trackWaLabel">שלח הודעה בוואטסאפ</span></a>
  </div>
</div>

<div id="footer-mount"></div>
<script src="assets/app.js"></script>
<script>
  function updateTrackWa() {
    var num = document.getElementById('orderNum').value.trim().toUpperCase();
    var msg = num
      ? 'שלום SafeView! אני רוצה לבדוק סטטוס הזמנה מספר: ' + num
      : 'שלום SafeView! אני רוצה לבדוק סטטוס הזמנה שלי.';
    document.getElementById('trackWa').href = waLink(msg);
    var label = document.getElementById('trackWaLabel');
    if (label) label.textContent = num ? 'צור קשר לגבי הזמנה ' + num : 'שלח הודעה בוואטסאפ';
  }
  updateTrackWa();

  // enter key support + live WA link update
  document.getElementById('orderNum').addEventListener('keydown', function(e){ if(e.key==='Enter') trackOrder(); });
  document.getElementById('orderNum').addEventListener('input', updateTrackWa);

  // דוגמת נתוני הזמנות (בפועל — לחבר ל-backend או לגיליון Google)
  var DEMO_ORDERS = {
    'SV-2026-00001': { status: 2, name: 'Baseus S1 Solar', date: '2026-06-20', shipping: 'יילו — 1234567890', eta: '2026-07-01' },
    'SV-2026-00002': { status: 3, name: 'ANNKE C1200', date: '2026-06-22', shipping: 'דואר ישראל — EE123456789IL', eta: '2026-06-30' },
    'SV-2026-DEMO':  { status: 1, name: 'Indoor 2K AI', date: '2026-06-28', shipping: '—', eta: 'בקרוב' }
  };

  var STEPS = [
    { label: 'התקבלה', icon: '✓' },
    { label: 'בהכנה',  icon: '📦' },
    { label: 'נשלחה',  icon: '🚚' },
    { label: 'נמסרה',  icon: '🏠' }
  ];

  function trackOrder() {
    var num = document.getElementById('orderNum').value.trim().toUpperCase();
    var el = document.getElementById('trackResult');
    el.className = 'track-result show';

    if (!num) {
      el.innerHTML = '<div class="track-not-found">הכנס מספר הזמנה</div>';
      return;
    }

    var order = DEMO_ORDERS[num];
    if (!order) {
      el.innerHTML = '<div class="track-not-found">' +
        '<div style="font-size:36px;margin-bottom:12px">🔍</div>' +
        '<strong>לא נמצאה הזמנה עם המספר הזה</strong><br>' +
        '<span style="font-size:13px;color:var(--text3);margin-top:8px;display:block">ודא שהמספר נכון, או <a href="'+waLink('שלום! אני מחפש הזמנה מספר: '+num)+'" target="_blank" style="color:var(--blue)">פנה אלינו בוואטסאפ</a></span>' +
        '</div>';
      return;
    }

    var progress = [0, 25, 65, 100][order.status] || 0;
    var stepsHtml = STEPS.map(function(s, i){
      var cls = i < order.status ? 'done' : i === order.status ? 'active' : '';
      return '<div class="track-step '+cls+'">' +
        '<div class="track-step-dot">'+(cls === 'done' ? '✓' : s.icon)+'</div>' +
        '<div class="track-step-label">'+s.label+'</div>' +
        '</div>';
    }).join('');

    el.innerHTML =
      '<div style="font-size:13px;color:var(--text3);margin-bottom:4px">הזמנה #'+num+'</div>' +
      '<div style="font-size:18px;font-weight:600;margin-bottom:16px">'+order.name+'</div>' +
      '<div class="track-status-bar" style="--progress:'+progress+'%">' + stepsHtml + '</div>' +
      '<div class="track-info">' +
        '<div><strong>תאריך הזמנה:</strong> '+order.date+'</div>' +
        '<div><strong>מספר מעקב:</strong> '+order.shipping+'</div>' +
        '<div><strong>משלוח משוער:</strong> '+order.eta+'</div>' +
      '</div>';
  }
</script>
</body>
</html>
