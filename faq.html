<div id="nav-mount"></div>
<div class="page-head"><h1>שאלות <strong>נפוצות</strong></h1><p>כל מה שרציתם לדעת — ואם לא מצאתם, דברו איתנו בוואטסאפ</p></div>

  <div class="faq-wrap" id="faqWrap"></div>
  <div style="max-width:820px;margin-top:28px"><a class="btn-wa" id="faqWa" href="#">לא מצאתם תשובה? שאלו בוואטסאפ ←</a></div>
</section>
<div id="footer-mount"></div>
<script src="assets/app.js"></script>
<script>
  var FAQ = [
    ['האם צריך אינטרנט בבית כדי שהמצלמות יעבדו?','רוב המצלמות שלנו עובדות עם WiFi ביתי רגיל ברשת 2.4GHz (כל ראוטר ביתי בישראל תומך בזה). המצלמה הסולארית עם 4G פועלת באופן עצמאי לחלוטין באמצעות כרטיס SIM — אין צורך בכלל באינטרנט בבית. זה הופך אותה לפתרון מושלם לבתי קיץ, חצרות פרטיות, אתרי בנייה, חניות מרוחקות וכל מקום ללא תשתית אינטרנט קבועה.'],
    ['כמה זמן לוקח המשלוח?','אנחנו שולחים את ההזמנה בהקדם האפשרי עם חברת שליחויות מקצועית לכל רחבי הארץ. מיד עם יציאת המשלוח תקבלו מספר מעקב שאיתו תוכלו לעקוב אחרי החבילה בזמן אמת. אפשרות נוספת היא איסוף עצמי מנקודות חלוקה בערים המרכזיות. משלוח חינם לכל הזמנה מעל ₪200.'],
    ['האם קשה להתקין את המצלמה? צריך טכנאי?','לא, ההתקנה פשוטה לחלוטין ולא דורשת טכנאי. התהליך הוא: (1) מחברים את המצלמה לחשמל או מציבים את הפאנל הסולארי בכיוון השמש, (2) מורידים את האפליקציה הייעודית בחנות האפליקציות, (3) סורקים את קוד ה-QR שמודבק על המצלמה. תוך 5 דקות המצלמה מחוברת לסמארטפון שלכם. כל מצלמה מגיעה עם מדריך התקנה ברור בעברית.'],
    ['מה בדיוק כוללת האחריות?','כל המצלמות שלנו מגיעות עם אחריות יצרן מלאה לשנה (12 חודשים) מיום הרכישה. האחריות מכסה תקלות ייצור, החלפת מוצר פגום, ותמיכה טכנית בעברית באמצעות וואטסאפ או מייל. במקרה של תקלה — פשוט פנו אלינו בוואטסאפ עם החשבונית והמוצר יוחלף. חשוב לשמור את חשבונית הקנייה למקרה הצורך.'],
    ['האם ניתן לצפות במצלמה מהטלפון מכל מקום בעולם?','בוודאי — זו אחת היכולות המרכזיות שלנו. כל המצלמות תומכות בצפייה חיה מרחוק 24/7 דרך אפליקציה ייעודית למכשירי iOS ו-Android, מכל מקום בעולם שיש בו אינטרנט. בנוסף תקבלו התראות פוש בזמן אמת על תנועה, גישה להקלטות עבר, ובדגמים תומכים גם שיחה דו-כיוונית (תוכלו לדבר עם מי שמולה).'],
    ['אילו אמצעי תשלום אתם מקבלים?','אנחנו מקבלים את כל אמצעי התשלום הנפוצים בישראל: כרטיסי אשראי (ויזה, מאסטרקרד, אמריקן אקספרס, ישראכרט), אפליקציית Bit, PayPal, Apple Pay ו-Google Pay. כל התשלומים מבוצעים בסליקה מאובטחת בהצפנת SSL ברמה בנקאית. פרטי האשראי שלכם לא נשמרים אצלנו בכלל.'],
    ['האם המצלמות עמידות לגשם, חום ולחות?','בהחלט. המצלמות החיצוניות והסולאריות שלנו עמידות לכל מזג אוויר ישראלי לפי תקני IP בינלאומיים — IP65, IP66 או IP67, תלוי בדגם. הן עוברות בדיקות עמידות מול גשם חזק, חום קיצוני (עד 60°C), קור, אבק ולחות גבוהה. ניתן להתקין אותן בחוץ באופן קבוע ללא חשש. המצלמות הפנימיות, כשמן, מיועדות לשימוש בתוך הבית או המשרד.'],
    ['איך מחזירים מוצר אם לא מרוצים?','יש לכם 14 ימי החזרה מלאים מרגע קבלת המוצר, ללא צורך בהסבר ובלי שאלות מיותרות. התהליך: פונים אלינו בוואטסאפ, אנחנו שולחים הוראות החזרה והכתובת, אתם שולחים את המוצר חזרה במצב תקין ובאריזה המקורית, ולאחר קבלתו אצלנו הזיכוי יבוצע תוך 5 ימי עסקים לאמצעי התשלום שאיתו רכשתם.'],
    ['האם יש ראיית לילה? היא בצבע או שחור-לבן?','כן, לכל המצלמות שלנו יש ראיית לילה. רוב הדגמים שלנו (ובמיוחד הסולאריות, החיצוניות והפלאגשיפ) כוללים ראיית לילה צבעונית מתקדמת באמצעות LED — תקבלו תמונה ברורה ובצבע מלא גם בחושך מוחלט, לא רק שחור-לבן. דגמים בסיסיים יותר משתמשים באינפרא-אדום (תמונה איכותית בשחור-לבן), שגם הוא מספק זיהוי מעולה.'],
    ['האם המצלמה שומרת הקלטות? איפה הן נשמרות?','כן. כל המצלמות תומכות בהקלטה מתמשכת או בתגובה לתנועה, באמצעות אחת משתי דרכים (חלק מהדגמים תומכים בשתיהן): (1) כרטיס זיכרון microSD שמותקן בתוך המצלמה (עד 128GB ברוב הדגמים) — הכי פשוט ופרטי, (2) אחסון בענן דרך מנוי באפליקציה. ניתן לצפות בהקלטות העבר ולהוריד קטעים ישירות לסמארטפון.'],
    ['מה ההבדל בין המצלמות הסולאריות לרגילות?','המצלמות הסולאריות הן עצמאיות לחלוטין: פאנל סולארי מובנה טוען סוללה פנימית (בדרך כלל 6,000-12,000 מילי-אמפר), והן עובדות 24/7 ללא חיבור לחשמל. זה חוסך עלויות חשמל וחיווט, ומאפשר התקנה במקומות שאין בהם שקע (גגות, גדרות, חצרות מרוחקות). המצלמות הרגילות מתחברות לחשמל וצורכות מעט מאוד אנרגיה.'],
    ['האם אפשר לקנות מספר מצלמות יחד? יש הנחה?','בהחלט. הצענו 3 חבילות מוכנות מראש בדף הבית (חבילת בית, חבילת עסק, חבילת מתחילים) במחירים משתלמים. לרכישות מותאמות אישית או הזמנות גדולות (לעסקים, מבני מגורים, אתרי בנייה) — צרו איתנו קשר בוואטסאפ ונבנה לכם הצעת מחיר מותאמת עם הנחה.']
  ];
  document.getElementById('faqWrap').innerHTML = FAQ.map(function(f){
    return '<div class="faq-item"><button class="faq-q">'+f[0]+'</button><div class="faq-a"><div class="faq-a-inner">'+f[1]+'</div></div></div>';
  }).join('');
  document.getElementById('faqWa').href = waLink('שלום SafeView! יש לי שאלה שלא מצאתי עליה תשובה.');
  initFaq();

  // FAQPage JSON-LD Schema — מאפשר לגוגל להציג שאלות נפוצות ישירות בתוצאות החיפוש
  var faqSchema = {
    "@context": "https://schema.org",
    "@type": "FAQPage",
    "mainEntity": FAQ.map(function(f){
      return {
        "@type": "Question",
        "name": f[0],
        "acceptedAnswer": { "@type": "Answer", "text": f[1] }
      };
    })
  };
  var s = document.createElement('script');
  s.type = 'application/ld+json';
  s.textContent = JSON.stringify(faqSchema);
  document.head.appendChild(s);
</script>
</body>
</html>
