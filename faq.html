<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>שאלות נפוצות | SafeView</title>
<meta name="description" content="שאלות נפוצות על מצלמות אבטחה SafeView – התקנה, משלוחים, אחריות, תשלום והחזרות.">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Noto+Sans+Hebrew:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/style.css">
</head>
<body>
<div id="nav-mount"></div>
<div class="page-head"><h1>שאלות <strong>נפוצות</strong></h1><p>כל מה שרציתם לדעת — ואם לא מצאתם, דברו איתנו בוואטסאפ</p></div>
<section style="padding-top:32px">
  <div class="faq-wrap" id="faqWrap"></div>
  <div style="max-width:820px;margin-top:28px"><a class="btn-wa" id="faqWa" href="#">לא מצאתם תשובה? שאלו בוואטסאפ ←</a></div>
</section>
<div id="footer-mount"></div>
<script src="assets/app.js"></script>
<script>
  var FAQ = [
    ['האם צריך אינטרנט למצלמות?','רוב המצלמות פועלות עם WiFi ביתי (2.4GHz). המצלמה הסולארית עם 4G עובדת גם ללא WiFi באמצעות כרטיס SIM — מתאים למקומות מרוחקים ללא תשתית.'],
    ['כמה זמן לוקח המשלוח?','משלוח רגיל 3-7 ימי עסקים לכל הארץ. משלוח מהיר 1-3 ימי עסקים בתוספת תשלום. משלוח חינם בהזמנה מעל ₪200.'],
    ['האם קשה להתקין את המצלמה?','ממש לא. ההתקנה אורכת כ-5 דקות: מחברים לחשמל/סולאר, מורידים את האפליקציה, סורקים קוד QR והמצלמה מחוברת. מדריך התקנה בעברית מצורף לכל מצלמה.'],
    ['מה כוללת האחריות?','כל המוצרים מגיעים עם אחריות יצרן מלאה ל-12 חודשים מיום הרכישה, כולל תמיכה טכנית בעברית. שמרו את חשבונית הקנייה.'],
    ['האם ניתן לצפות מהטלפון?','כן! כל המצלמות תומכות בצפייה חיה מרחוק מכל מקום בעולם דרך אפליקציה ייעודית (iOS / Android), כולל התראות בזמן אמת.'],
    ['אילו אמצעי תשלום מתקבלים?','כרטיסי אשראי (ויזה, מאסטרקרד, אמריקן אקספרס), Bit, PayPal ו-Apple Pay. כל התשלומים מאובטחים בהצפנת SSL.'],
    ['האם המצלמות עמידות לגשם?','המצלמות החיצוניות והסולאריות עמידות למים בתקן IP65/IP66/IP67 — מתאימות לכל מזג אוויר ישראלי. המצלמות הפנימיות מיועדות לשימוש בבית.'],
    ['איך מחזירים מוצר?','יש לכם 14 יום מקבלת המוצר. צרו קשר בוואטסאפ, נשלח הוראות החזרה, ולאחר קבלת המוצר הזיכוי יבוצע תוך 5 ימי עסקים.'],
    ['האם יש ראיית לילה?','כן, לכל המצלמות יש ראיית לילה. רוב הדגמים שלנו כוללים ראיית לילה צבעונית מתקדמת — תמונה ברורה בצבע גם בחושך מוחלט.'],
    ['האם המצלמה שומרת הקלטות?','כן — באמצעות כרטיס SD (חלק מהדגמים כוללים) ו/או אחסון בענן, בהתאם לדגם. ניתן לצפות בהקלטות ולהוריד אותן מהאפליקציה.']
  ];
  document.getElementById('faqWrap').innerHTML = FAQ.map(function(f){
    return '<div class="faq-item"><button class="faq-q">'+f[0]+'</button><div class="faq-a"><div class="faq-a-inner">'+f[1]+'</div></div></div>';
  }).join('');
  document.getElementById('faqWa').href = waLink('שלום SafeView! 👋 יש לי שאלה שלא מצאתי עליה תשובה.');
  initFaq();
</script>
</body>
</html>
