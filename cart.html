<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>עגלת קניות | SafeView</title>
<meta name="description" content="עגלת הקניות שלך ב-SafeView. השלמת הזמנה מהירה בוואטסאפ.">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Noto+Sans+Hebrew:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/style.css">
</head>
<body>

<div id="nav-mount"></div>

<div class="page-head">
  <h1>עגלת <strong>קניות</strong></h1>
  <p>בדקו את ההזמנה והשלימו את התשלום בצורה מאובטחת</p>
</div>

<div class="cart-wrap" id="cartWrap"></div>

<div id="footer-mount"></div>

<script src="assets/app.js"></script>
<script>
  function renderCart(){
    var c = getCart();
    var wrap = document.getElementById('cartWrap');
    if (!c.length){
      wrap.innerHTML = '<div class="cart-empty"><div class="cart-empty-icon">'+ICON.cart+'</div><p>העגלה ריקה.</p><br><a class="btn-primary" href="index.html#products">לכל המצלמות ←</a></div>';
      return;
    }
    // שלב 1: skeleton בזמן שהמוצרים נטענים
    wrap.innerHTML = '<div style="text-align:center;padding:40px;color:var(--text2)">טוען...</div>';

    fetchShopifyProducts().then(function(products){
      var map = {};
      products.forEach(function(p){ map[p.id] = p; });

      var itemsHtml = c.map(function(i){
        var p = map[i.id] || getProduct(i.id);
        if (!p) return '';
        var linePrice = (i.price || p.price) * i.qty;
        return '<div class="cart-item">' +
          '<img src="'+p.img+'" alt="'+p.name+'">' +
          '<div class="cart-item-info"><div class="cart-item-name">'+p.name+'</div><div class="cart-item-price">'+fmt(linePrice)+'</div></div>' +
          '<div class="cart-qty"><button onclick="chg(\''+p.id+'\',-1)">−</button><span>'+i.qty+'</span><button onclick="chg(\''+p.id+'\',1)">+</button></div>' +
          '<button class="cart-remove" onclick="rm(\''+p.id+'\')" aria-label="הסר">×</button>' +
        '</div>';
      }).join('');

      var total = c.reduce(function(s,i){
        var p = map[i.id] || getProduct(i.id);
        return s + (p ? (i.price || p.price) * i.qty : 0);
      }, 0);
      var remaining = FREE_SHIP_THRESHOLD - total;
      var pct = Math.min(100, Math.round(total / FREE_SHIP_THRESHOLD * 100));
      var shipMsg = '<div style="margin:12px 0 6px">' +
        '<div style="display:flex;justify-content:space-between;font-size:12px;color:var(--text2);margin-bottom:6px">' +
          (remaining > 0
            ? '<span>עוד <strong style="color:var(--gold)">'+fmt(remaining)+'</strong> למשלוח חינם</span>'
            : '<span style="color:var(--accent);font-weight:600">✓ זכית במשלוח חינם!</span>') +
          '<span>'+pct+'%</span>' +
        '</div>' +
        '<div style="background:var(--bg4);border-radius:20px;height:8px;overflow:hidden">' +
          '<div style="height:100%;width:'+pct+'%;background:'+(pct>=100?'var(--accent)':'linear-gradient(90deg,var(--blue),var(--accent))')+';border-radius:20px;transition:width .4s ease"></div>' +
        '</div>' +
      '</div>';

      wrap.innerHTML = itemsHtml +
        '<div class="cart-summary">' +
          '<div class="cart-row"><span>סכום ביניים</span><span>'+fmt(total)+'</span></div>' +
          shipMsg +
          '<div class="cart-total"><span>סה"כ</span><strong>'+fmt(total)+'</strong></div>' +
          '<button class="btn-primary" id="checkoutBtn" style="width:100%;margin-top:18px;padding:15px;font-size:17px" onclick="createShopifyCheckout()">לתשלום מאובטח ←</button>' +
          '<button class="btn-wa" style="width:100%;margin-top:10px;padding:13px" onclick="checkoutWhatsApp()">'+ICON.wa+' הזמן בוואטסאפ</button>' +
          '<a class="btn-secondary" style="width:100%;margin-top:10px;justify-content:center" href="index.html#products">המשך בקנייה</a>' +
        '</div>';
    });
  }
  function chg(id, d){ var it = getCart().filter(function(i){return i.id===id;})[0]; if(it){ setQty(id, it.qty + d); renderCart(); } }
  function rm(id){ removeFromCart(id); renderCart(); }
  renderCart();
</script>

</body>
</html>
