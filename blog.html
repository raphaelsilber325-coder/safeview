    { t:'ראיית לילה: צבעונית מול אינפרא-אדומה — מה האמת על הטכנולוגיה?', d:'יוני 2026',
      body:'<p>ראיית לילה הפכה לסטנדרט במצלמות אבטחה. אבל יש 2 טכנולוגיות שונות לחלוטין — והבחירה ביניהן משפיעה ישירות על איכות הזיהוי בלילה.</p><p><strong>אינפרא-אדומה (IR) — הקלאסית:</strong></p><ul><li>📡 <strong>איך זה עובד:</strong> פולטת קרני אינפרא-אדום שהעין לא רואה. המצלמה רואה הכל באפור-לבן.</li><li>✅ עובדת בחושך מוחלט (אפס אור)</li><li>✅ זול - בכל מצלמה בסיסית</li><li>❌ תמונה <strong>שחור-לבן</strong> בלבד — לא רואים צבעי בגדים או רכבים</li><li>❌ פולש יכול לראות את הנקודות האדומות של ה-LED</li></ul><p><strong>צבעונית (Full Color Night Vision) — המהפכה החדשה:</strong></p><ul><li>📡 <strong>איך זה עובד:</strong> חיישן רגיש במיוחד + LED לבן עדין שמדמה אור שמש</li><li>✅ <strong>תמונה צבעונית מלאה</strong> גם בלילה — מזהים בגדים, רכבים, אנשים בקלות</li><li>✅ נראית כמו צילום ביום, רק יותר חלש</li><li>✅ <strong>מרתיעה גנבים</strong> — האור הלבן עצמו מבעית אותם</li><li>❌ דורשת קצת אור סביבתי (פנס רחוב, ירח)</li><li>❌ קצת יותר יקרה</li></ul><p><strong>מה לבחור?</strong> אם אתם רוצים <strong>אמת אבטחה אמיתית</strong> — בחרו Full Color. הזיהוי הצבעוני שווה זהב כשמדובר במזהה גנב או רכב חשוד.</p><p>ב-SafeView, מצלמות Baseus S1 Lite, Solar 3MP, ZUMIMALL F5 — כולן עם ראיית לילה צבעונית מלאה.</p>' },
    { t:'AI במצלמות אבטחה — איך זה באמת מזהה אנשים?', d:'יוני 2026',
      body:'<p>"מצלמה עם AI" זה אחד הביטויים הכי מנופחים בשוק. אבל בכל זאת — יש הבדל אמיתי בין מצלמת AI טובה לאחת שסתם משווקת ככזו. הנה הסבר פשוט.</p><p><strong>איך המצלמה מזהה אדם?</strong></p><p>בפנים, יש <strong>מודל AI</strong> שראה מיליוני תמונות של אנשים. הוא מחפש דפוסי גוף אנושי — ראש, כתפיים, רגליים. כשהוא רואה משהו שדומה — הוא נותן ציון 0-100% של "כמה זה אדם".</p><p><strong>3 רמות של AI במצלמות:</strong></p><ul><li><strong>רמה 1 — זיהוי תנועה בלבד:</strong> מתריעה על כל דבר שזז (חתול, עלים ברוח, מיקרוגל). <em>התראות שווא ענקיות.</em></li><li><strong>רמה 2 — זיהוי בני אדם (Human Detection):</strong> מבדילה בין אדם לבעלי חיים. ההתראות הרבה יותר רלוונטיות.</li><li><strong>רמה 3 — זיהוי מתקדם:</strong> מזהה אדם, רכב, חיית מחמד, אורח קבוע מול זר. מאפשרת לסמן "אזורי חיבה" — מתעלמת מתנועה ברחוב, מתריעה רק על תנועה בחצר שלך.</li></ul><p><strong>כשהמצלמה אומרת "AI Tracking" — מה היא עושה?</strong></p><p>מעקב אוטומטי. ברגע שהמצלמה זיהתה אדם — היא <strong>מסתובבת אחריו</strong> ושומרת אותו במרכז הפריים. דורש מצלמת PTZ (Pan-Tilt-Zoom).</p><p><strong>איך מזהים מצלמת AI איכותית באמת?</strong></p><ul><li>היא מבדילה בין אדם לחתול (לא רק "תנועה")</li><li>יש מצב "אזורי התעלמות" באפליקציה</li><li>התראה מגיעה תוך 2-3 שניות (לא 30 שניות אחרי)</li><li>שולחת תמונה ממוקדת של האדם, לא וידאו רגיל</li></ul><p>ב-SafeView, Blurams 2K, פלאגשיפ 16MP ו-O-Kam Solar PTZ — כולן עם AI איכותי.</p>' },
    { t:'מתי לבחור מצלמת 4G במקום WiFi? מדריך מלא', d:'יוני 2026',
      body:'<p>רוב המצלמות בשוק עובדות עם WiFi. אבל יש מקרים שבהם מצלמת 4G היא הפתרון היחיד שיעבוד באמת. מתי כדאי לבחור בה?</p><p><strong>5 מצבים שבהם 4G הכרחי:</strong></p><ul><li><strong>בית כפרי / מבודד</strong> — אין כיסוי WiFi מספיק חזק</li><li><strong>אתר בנייה</strong> — אין תשתית WiFi קבועה</li><li><strong>חנות / קיוסק קטן</strong> — אין רצון להוסיף ראוטר נפרד</li><li><strong>חצר / חוות בעלי חיים</strong> — מצלמה רחוקה מהבית</li><li><strong>גיבוי לרשת WiFi</strong> — אם הראוטר ייפול, המצלמה תמשיך לעבוד</li></ul><p><strong>איך זה עובד טכנית?</strong></p><p>כמו טלפון נייד — צריך <strong>כרטיס SIM</strong> בתוך המצלמה. הסים מתחבר לרשת הסלולרית (פלאפון, סלקום, פרטנר) ומשדר את הוידאו דרכה.</p><p><strong>חסרונות שצריך לדעת:</strong></p><ul><li>💰 <strong>עלות חודשית</strong> — דרוש חבילת דאטה לסים (₪10-30/חודש)</li><li>📊 <strong>צריכת דאטה גבוהה</strong> — וידאו רציף מצורך 50-100GB לחודש</li><li>📍 <strong>איכות תלויה בקליטה</strong> — באזורים שבהם הסלולרי חלש, המצלמה תיתקע</li></ul><p><strong>טיפ — בחרו חבילת סלולר ייעודית למצלמות:</strong></p><p>חברות הסלולרי הציעו חבילות "IoT" מיוחדות במחיר זול — חבילה של 100GB לחודש ב-₪30-50.</p><p>ב-SafeView יש מצלמות 4G של LS VISION, CamHi ו-Ease Life — כולן תומכות בסים ישראלי.</p>' },
    { t:'איך מאבטחים את המצלמה מהאקרים? המדריך לפרטיות', d:'יוני 2026',
      body:'<p>זה הסיוט של כל מי שמתקין מצלמת אבטחה — שמישהו יתחבר אליה ויצפה בכם. החדשות הטובות: זה כמעט תמיד ניתן למניעה. הנה כל מה שצריך לדעת.</p><p><strong>5 דרכים שמצלמה נפרצת:</strong></p><ul><li><strong>1. סיסמה ברירת מחדל</strong> — admin/admin או 12345. <em>החלפה ראשונה!</em></li><li><strong>2. קושחה ישנה</strong> — לא מעדכנים את המצלמה כשמתקבל עדכון</li><li><strong>3. רשת WiFi לא מאובטחת</strong> — סיסמת WPA ישנה או חלשה</li><li><strong>4. אפליקציה מפוקפקת</strong> — לא מהחנות הרשמית</li><li><strong>5. ענן זול</strong> — ספק ענן ללא הצפנה איכותית</li></ul><p><strong>צ\'ק-ליסט אבטחה (5 דקות עבודה):</strong></p><ol><li>שינוי <strong>שם המשתמש והסיסמה</strong> מ-admin למשהו ייחודי וחזק</li><li>הפעלת <strong>אימות דו-שלבי (2FA)</strong> באפליקציה</li><li>עדכון <strong>קושחה</strong> — תפריט הגדרות → "Firmware Update"</li><li>שינוי <strong>סיסמת WiFi</strong> לעוצמה WPA3 או WPA2 חזק</li><li>השבתת <strong>UPnP</strong> בראוטר (זה החור הכי נפוץ)</li></ol><p><strong>איך מזהים שמצלמה נפרצה?</strong></p><ul><li>סיבוב פתאומי שלא יזמתם</li><li>אור LED שדולק כשאתם לא צופים</li><li>התראות גישה לא מוכרות באפליקציה</li></ul><p><strong>מצלמות שלא תקנו לעולם — סיגניית האדום:</strong></p><ul><li>מותג לגמרי לא ידוע ב-AliExpress</li><li>אפליקציה שלא בחנות Google Play / Apple App Store</li><li>ללא תיעוד בקרת אבטחה (CE / FCC / TUV)</li></ul><p>ב-SafeView כל המצלמות עם אפליקציות רשמיות (ICSee, Ease Life, V380 Pro, Blurams) — מאובטחות ומעודכנות באופן קבוע.</p>' },
    { t:'מצלמה ב-3 דקות — הגדרה ראשונית למתחילים', d:'יוני 2026',
      body:'<p>קיבלתם את המצלמה החדשה. עכשיו צריך להתקין ולחבר. אם זו הפעם הראשונה — אל תדאגו, זה באמת קל. הנה תהליך מובנה:</p><p><strong>שלב 1: הכנה (30 שניות)</strong></p><ul><li>פתחו את הקופסה — תראו: מצלמה, ברגי הרכבה, מתאם חשמל, מדריך</li><li>הורידו את האפליקציה הנכונה ל-iOS/Android (כתוב במדריך — בדרך כלל ICSee, Ease Life, V380 Pro, Blurams)</li><li>צרו חשבון באפליקציה (מייל + סיסמה)</li></ul><p><strong>שלב 2: הפעלה ראשונית (1 דקה)</strong></p><ul><li>חברו את המתאם לחשמל ולמצלמה</li><li>חכו לאיתות — צפצוף, או LED בצבע מסוים</li><li>המצלמה תיכנס למצב "AP Mode" — מחכה לחיבור</li></ul><p><strong>שלב 3: חיבור לוויפי (1 דקה)</strong></p><ul><li>באפליקציה, לחצו "+" → "הוסף מצלמה"</li><li>סרקו את ה-QR בתחתית המצלמה (או הקלידו ידנית)</li><li>הזינו את שם הרשת והסיסמה של ה-WiFi</li><li>המצלמה תצפצף שוב = מוכנה</li></ul><p><strong>שלב 4: התקנה פיזית (30 שניות)</strong></p><ul><li>קבעו מקום — קיר, תקרה, מדף</li><li>סמנו את החורים עם הטמפלייט שבמדריך</li><li>קדחו, הברגו, התקינו</li><li>חברו את המתאם לחשמל קבוע</li></ul><p><strong>טיפים נוספים:</strong></p><ul><li>📡 <strong>WiFi 2.4G חובה</strong> — רוב המצלמות לא תומכות ב-5G לחיבור הראשוני</li><li>📱 <strong>הפעילו התראות פוש</strong> כדי לקבל אזעקות בזמן אמת</li><li>🔋 <strong>בדקו סוללה</strong> — אם זו מצלמה אלחוטית, וודאו שטעונה במלואה</li><li>📸 <strong>עשו צילום בדיקה</strong> — שתבטיחו שהיא מצלמת באיכות הרצויה</li></ul><p>נתקעתם? אנחנו זמינים בוואטסאפ — נעזור לכם תוך 10 דקות.</p>' }
