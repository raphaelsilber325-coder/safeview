      body:'<p>בחירת מצלמה יכולה לבלבל — הנה מה שחשוב לדעת:</p><ul><li><strong>רזולוציה:</strong> לבית מספיק 2K/3MP. לכניסות ושטחים גדולים — 4K/16MP.</li><li><strong>חיבור:</strong> WiFi לבית רגיל, 4G למקומות ללא אינטרנט, סולארי כשאין חשמל.</li><li><strong>ראיית לילה:</strong> צבעונית עדיפה — מזהים צבעי בגדים גם בחושך.</li><li><strong>זיהוי AI:</strong> מבדיל בין אדם לחיה ומונע התראות שווא.</li><li><strong>עמידות:</strong> לחוץ דרשו לפחות IP65.</li></ul>' },

    { t:'מצלמת נורה E27 — למה כולם מדברים על זה ב-2026?', d:'יוני 2026',
      body:'<p>מצלמת נורה היא בדיוק מה שנשמעת — מצלמת אבטחה שנכנסת לשקע נורה רגיל (בסיס E27) ועובדת כנורה רגילה מבחוץ. אחד החידושים הכי פופולריים בשוק האבטחה הביתית.</p><p><strong>למה זה כל כך טוב?</strong></p><ul><li><strong>אפס ברגים ואפס טכנאי</strong> — מסירים את הנורה הישנה, בורגים את המצלמה, גמור. 10 שניות.</li><li><strong>סמוי לחלוטין</strong> — נראה כמו נורה רגילה. גנבים לא ישימו לב.</li><li><strong>חשמל מובנה</strong> — מקבלת חשמל מהשקע, אין צורך בסוללה.</li><li><strong>כיסוי 360°</strong> — חלק מהדגמים מסתובבים לכיסוי מלא של החדר.</li></ul><p>ב-SafeView יש לנו 3 דגמי נורה: Ease Life 360° לחוץ, 8MP עם זום כפול לפנים, ו-Lenovo 3MP לניטור תינוק וחיות מחמד.</p>' },
    { t:'מצלמת אבטחה לחצר — מה הכי מתאים לישראל?', d:'יוני 2026',
      body:'<p>חצר ישראלית מאתגרת מצלמות: חום קיצוני בקיץ, גשמים בחורף, ועפר ואבק כל השנה. הנה מה שעובד:</p><p><strong>האתגרים הישראלים:</strong></p><ul><li>חום עד 45°C בצל — דרשו עמידות טמפרטורה מאושרת</li><li>גשמים בחורף — מינימום IP65 (IP67 עדיף)</li><li>שמש ישירה על העדשה — בחרו עם הגנת UV מובנית</li><li>ריחוק מהראוטר — WiFi 5GHz קולט פחות טוב מ-2.4GHz למרחקים</li></ul><p><strong>המלצות לחצר:</strong></p><ul><li><strong>ללא חשמל בחצר:</strong> סולארית (Baseus S1 או Solar 3MP) — אין חיווט, פועלת 24/7</li><li><strong>כניסה ושער:</strong> WiFi חיצונית עם ראיית לילה — מספיק 1080P/3MP</li><li><strong>שטח גדול:</strong> PTZ עם זום 10x — מצלמה אחת שמכסה הכל</li><li><strong>מרוחק מאוד:</strong> 4G עם סולאר — LS VISION או CamHi</li></ul><p>לרוב החצרות הישראליות — מצלמת סולאר ב-₪255-₪579 היא הפתרון המושלם.</p>' },
    { t:'מצלמה ללא חיווט וללא חשמל — האם זה באמת אפשרי?', d:'יוני 2026',
      body:'<p>כן — וזו אחת ההתפתחויות המרגשות ביותר בעולם האבטחה. מצלמה סולארית אלחוטית עובדת לחלוטין ללא חשמל וללא כבלים.</p><p><strong>איך זה עובד?</strong></p><ul><li>פאנל סולארי קטן טוען סוללה פנימית (6,000–12,000 mAh) במהלך היום</li><li>הסוללה מחזיקה גם בלילות ובימים מעוננים</li><li>WiFi אלחוטי — אין כבל רשת, אין כבל חשמל</li><li>אחסון על כרטיס SD או ענן — גם שם אין חיווט</li></ul><p><strong>הגבלות שכדאי לדעת:</strong></p><ul><li>לא מקליטות 24/7 רציף (חסכון בחשמל) — מקליטות בתנועה</li><li>בחורף ירושלמי עם ענן רב — הסוללה עלולה לרדת, כדאי לאחסן נוסף</li><li>WiFi 4G (SIM) — פתרון לשטחים ממש מרוחקים ללא כלום</li></ul><p>המצלמות הסולאריות שלנו מתחילות מ-₪255 (Solar 3MP) ועד ₪999 (O-Kam PTZ עם זום 10x).</p>' },
    { t:'מצלמת אבטחה 4K — שווה לשלם יותר?', d:'יוני 2026',

    { t:'מערכת מצלמות NVR לבית ולעסק — מתי זה הפתרון הנכון?', d:'יוני 2026',
      body:'<p>מערכת NVR (Network Video Recorder) היא המקליט המרכזי שמנהל כמה מצלמות במקביל ומאחסן הכל בדיסק קשיח. מתי היא עדיפה על מצלמות נפרדות?</p><p><strong>NVR מתאים כאשר:</strong></p><ul><li><strong>4+ מצלמות</strong> — ניהול ממקום אחד, לא 4 אפליקציות שונות</li><li><strong>הקלטה 24/7 רציפה</strong> — לא רק בתנועה, כל שעה בכל יום</li><li><strong>ללא תלות בענן</strong> — כל ההקלטות שמורות מקומית, גם אם האינטרנט נפל</li><li><strong>עסקים ומבני מגורים</strong> — מחסן, חניון, בניין משרדים</li></ul><p><strong>NVR לא מתאים כאשר:</strong></p><ul><li>רוצים להתקין בעצמם ב-5 דקות (NVR דורש תכנון)</li><li>מעט מצלמות (2-3) — מצלמות WiFi נפרדות פשוטות יותר</li><li>תקציב מוגבל — הכי זול ב-₪679 (ANNKE NVR Kit)</li></ul><p>ב-SafeView יש מערכות NVR של ANNKE ו-Gadinan מ-₪679 עד ₪3,299 — כולן עם אחריות שנה.</p>' }
